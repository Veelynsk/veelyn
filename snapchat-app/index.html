<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Snapchat</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ==================== LOGIN SCREEN ==================== -->
  <section id="screen-login" class="screen visible">
    <header class="nav">
      <button class="nav-back" id="back-btn" aria-label="Back">
        <svg viewBox="0 0 24 24" width="22" height="22"><path fill="none" stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" d="M15 5l-7 7 7 7"/></svg>
      </button>
      <h1 class="nav-title">Log In</h1>
      <div class="nav-right"></div>
    </header>

    <form id="login-form" class="form" autocomplete="off" novalidate>
      <label class="field">
        <span class="field-label">USERNAME, EMAIL OR PHONE</span>
        <input id="username" type="text" autocapitalize="none" autocorrect="off" spellcheck="false" inputmode="text" />
        <span class="field-line"></span>
      </label>

      <label class="field">
        <span class="field-label">PASSWORD</span>
        <div class="field-row">
          <input id="password" type="password" autocapitalize="none" autocorrect="off" spellcheck="false" />
          <button type="button" id="toggle-pw" class="eye" aria-label="Show password">
            <svg viewBox="0 0 24 24" width="22" height="22"><path fill="none" stroke="#9ea3ad" stroke-width="1.6" d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3" fill="none" stroke="#9ea3ad" stroke-width="1.6"/></svg>
          </button>
        </div>
        <span class="field-line"></span>
      </label>

      <label class="checkbox">
        <input type="checkbox" id="save-login" checked />
        <span class="checkbox-box">
          <svg viewBox="0 0 24 24" width="14" height="14"><path fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" d="M5 12.5l4.5 4.5L19 7.5"/></svg>
        </span>
        <span>Save Login info on your iCloud devices</span>
      </label>

      <a href="#" class="forgot" id="forgot-link">Forgot your password?</a>

      <div class="login-actions">
        <button id="login-btn" type="submit" class="btn-primary" disabled>
          <span class="btn-label">Log In</span>
          <span class="btn-spinner" aria-hidden="true"></span>
        </button>

        <div class="or-row" id="or-row" hidden>
          <span class="or-line"></span><span class="or-text">OR</span><span class="or-line"></span>
        </div>

        <button type="button" class="btn-google" id="google-btn" hidden>
          <svg viewBox="0 0 48 48" width="20" height="20" aria-hidden="true">
            <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.6-6 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34 6.5 29.3 4.5 24 4.5 13.2 4.5 4.5 13.2 4.5 24S13.2 43.5 24 43.5 43.5 34.8 43.5 24c0-1.2-.1-2.3-.4-3.5z"/>
            <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8c1.8-3.5 5.4-6 9.6-6 3 0 5.8 1.1 7.9 3l5.7-5.7C34 6.5 29.3 4.5 24 4.5 16.4 4.5 9.7 8.7 6.3 14.7z"/>
            <path fill="#4CAF50" d="M24 43.5c5.2 0 9.9-2 13.4-5.2l-6.2-5.2c-2 1.5-4.5 2.4-7.2 2.4-5.3 0-9.7-3.4-11.3-8l-6.5 5C9.5 39.2 16.2 43.5 24 43.5z"/>
            <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4.1 5.4l6.2 5.2c-.4.4 6.6-4.8 6.6-14.6 0-1.2-.1-2.3-.4-3.5z"/>
          </svg>
          <span>Continue with Google</span>
        </button>

        <button type="button" class="btn-apple" id="apple-btn" hidden>
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" fill="#fff">
            <path d="M16.365 1.43c0 1.14-.41 2.21-1.23 3.04-.83.84-2 1.4-3.05 1.31-.13-1.1.42-2.27 1.18-3.06.84-.87 2.27-1.5 3.1-1.29zM20.5 17.34c-.55 1.27-.82 1.84-1.54 2.97-1 1.55-2.4 3.5-4.14 3.51-1.55.01-1.95-1.01-4.06-1-2.1.01-2.55 1.02-4.1 1-1.74-.02-3.07-1.78-4.07-3.33-2.79-4.34-3.08-9.43-1.36-12.14 1.22-1.93 3.15-3.06 4.96-3.06 1.84 0 3-1.01 4.52-1.01 1.48 0 2.38 1.01 4.5 1.01 1.78 0 3.66 1 4.86 2.74-4.27 2.34-3.58 8.45.43 9.31z"/>
          </svg>
          <span>Continue with Apple</span>
        </button>
      </div>

      <p class="footnote" id="footnote" hidden>Save Login info on your iCloud devices</p>
    </form>
  </section>

  <!-- ==================== CAMERA / HOME SCREEN ==================== -->
  <section id="screen-home" class="screen camera-screen">
    <!-- top bar -->
    <header class="cam-top">
      <div class="cam-top-left">
        <button id="profile-chip" class="bitmoji-btn" aria-label="Profile">
          <img id="bitmoji-img" alt="" />
          <span id="bitmoji-fallback" class="bitmoji-fallback"></span>
        </button>
        <button class="cam-icon" aria-label="Search">
          <svg viewBox="0 0 24 24" width="22" height="22"><circle cx="11" cy="11" r="7" fill="none" stroke="#fff" stroke-width="2"/><path d="M20 20l-3.5-3.5" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="cam-top-right">
        <button class="cam-icon" aria-label="Notifications">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 1112 0v5l1.5 2.5h-15L6 13V8z"/><path d="M10 19a2 2 0 004 0"/></svg>
          <span class="badge" id="notif-badge">12</span>
        </button>
        <button class="cam-icon" aria-label="Refresh">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 11-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg>
        </button>
      </div>
    </header>

    <!-- side toggles -->
    <aside class="side-toggles">
      <div class="toggle-row"><span>Flash</span>
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L4 14h7l-1 8 9-12h-7l1-8z"/><line x1="2" y1="22" x2="22" y2="2"/></svg>
      </div>
      <div class="toggle-row"><span>Sounds</span>
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      </div>
      <div class="toggle-row"><span>HD Mode</span>
        <span class="hd-pill">HD</span>
      </div>
      <div class="toggle-row"><span>Night Mode</span>
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/></svg>
      </div>
      <div class="toggle-row chevron"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></div>
    </aside>

    <!-- camera viewfinder fake -->
    <video id="cam-video" class="cam-feed" autoplay playsinline muted></video>
    <div class="cam-fallback"></div>

    <!-- zoom pill -->
    <div class="zoom-pill">1x</div>

    <!-- bottom controls -->
    <div class="cam-bottom">
      <button class="memories">
        <span class="memories-icon"></span>
        <span>Memories</span>
      </button>
      <button class="capture" aria-label="Capture"><span></span></button>
      <button class="spotlight"><span class="spotlight-badge">1</span></button>
    </div>

    <div class="filter-tabs">
      <span>Favourites</span>
      <span class="active">For You</span>
      <span>Aesthetic</span>
    </div>
  </section>

  <!-- ==================== PROFILE SHEET ==================== -->
  <section id="profile-sheet" class="profile-sheet">
    <button class="sheet-close" id="sheet-close" aria-label="Close">
      <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="#000" stroke-width="2.2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
    </button>

    <div class="sheet-body">
      <div class="big-avatar">
        <img id="big-avatar-img" alt="" />
        <span id="big-avatar-fallback"></span>
      </div>
      <h2 id="profile-name" class="profile-name">—</h2>
      <p id="profile-handle" class="profile-handle">@—</p>

      <div class="profile-stats">
        <div><b id="stat-snaps">0</b><span>Snaps</span></div>
        <div><b id="stat-friends">0</b><span>Friends</span></div>
        <div><b id="stat-streak">0</b><span>🔥 Streak</span></div>
      </div>

      <div class="profile-actions">
        <button class="pa-primary">+ Add Friend</button>
        <button class="pa-secondary">Message</button>
      </div>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
